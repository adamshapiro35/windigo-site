<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windigo Capital</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Background: Brighter overlay (changed from 0.8 to 0.45 for transparency) */
            background: linear-gradient(rgba(0, 15, 7, 0.45), rgba(0, 15, 7, 0.45)), url('tremblant.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }
        
        /* Logo: Shrinking the surround by making the logo smaller relative to the screen (changed from 60% to 45%) */
        img {
            max-width: 45%; 
            height: auto;
            margin-bottom: 30px; 
            /* Subtle shadow to keep the logo sharp and 'floating' against the brighter background */
            filter: drop-shadow(0 15px 25px rgba(0,0,0,0.6));
        }
        
        a {
            color: rgba(255, 255, 255, 0.95); /* Nearly pure white for visibility */
            text-decoration: none;
            font-size: 16px;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.3s ease;
            /* Text shadow to ensure visibility on the more transparent background */
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }
        
        a:hover {
            color: #ffffff;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Windigo Capital">
    <a href="mailto:info@windigocapital.com">Contact</a>
</body>
</html>
