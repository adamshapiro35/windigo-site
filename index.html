<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windigo Capital</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Background Image */
            background: linear-gradient(rgba(0, 15, 7, 0.45), rgba(0, 15, 7, 0.45)), url('tremblant.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* The Logo Container: This forces the symmetry */
        .logo-container {
            width: 450px;      /* Set a fixed width */
            height: 180px;     /* Set a fixed height for a sleek landscape box */
            overflow: hidden;  /* Hide the excess white from the image */
            display: flex;
            justify-content: center;
            align-items: center;
            background: white; /* This creates the clean, symmetric white box */
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .logo-container img {
            width: 110%;       /* Slightly zoom in to cut off the original white edges */
            height: auto;
        }

        a {
            color: rgba(255, 255, 255, 0.95);
            text-decoration: none;
            font-size: 14px;
            letter-spacing: 3px;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.3s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        a:hover {
            color: #ffffff;
            letter-spacing: 4px;
        }
        
        /* Ensures it looks good on iPhone */
        @media (max-width: 600px) {
            .logo-container {
                width: 85%;
                height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="logo.png" alt="Windigo Capital">
    </div>
    <a href="mailto:info@windigocapital.com">Contact</a>
</body>
</html>
