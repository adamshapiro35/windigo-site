<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windigo Capital</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Background Image */
            background: linear-gradient(rgba(0, 15, 7, 0.45), rgba(0, 15, 7, 0.45)), url('tremblant.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .content-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-top: 10vh; /* Keeps the overall group anchored at the 40% mark */
            width: 100%;
        }

        img {
            max-width: 50%;
            height: auto;
            /* LOWERING THE LOGO: Increased from 40px to 80px to push the logo down toward the link */
            margin-bottom: 80px; 
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 5px;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.4s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        a:hover {
            color: #ffffff;
            letter-spacing: 7px;
        }
        
        @media (max-width: 600px) {
            img {
                max-width: 80%;
                margin-bottom: 60px;
            }
            .content-wrapper {
                margin-top: 5vh;
            }
        }
    </style>
</head>
<body>
    <div class="content-wrapper">
        <img src="logo.png" alt="Windigo Capital">
        <a href="mailto:info@windigocapital.com">Contact</a>
    </div>
</body>
</html>
