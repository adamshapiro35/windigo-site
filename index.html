<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Windigo Capital</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: flex-start; /* Changed from center to align with new positioning */
            align-items: center;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            
            /* Background Image */
            background: linear-gradient(rgba(0, 15, 7, 0.45), rgba(0, 15, 7, 0.45)), url('tremblant.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        /* The Logo: Lowered to center within the dark base of the mountain */
        img {
            max-width: 50%;
            height: auto;
            margin-top: 55vh; /* This pushes the logo down 55% of the screen height */
            margin-bottom: 50px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8));
        }

        a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-size: 13px;
            letter-spacing: 5px;
            font-weight: 300;
            text-transform: uppercase;
            transition: all 0.4s ease;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        a:hover {
            color: #ffffff;
            letter-spacing: 7px;
        }
        
        @media (max-width: 600px) {
            img {
                max-width: 80%;
                margin-top: 50vh; /* Adjustment for mobile screens */
            }
        }
    </style>
</head>
<body>
    <img src="logo.png" alt="Windigo Capital">
    <a href="mailto:info@windigocapital.com">Contact</a>
</body>
</html>
